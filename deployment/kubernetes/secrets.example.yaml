# Example secrets manifest. Copy to secrets.yaml and populate with real values.
# DO NOT commit the populated secrets.yaml — it is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: snappark-secrets
  namespace: snappark
type: Opaque
stringData:
  # Shared DB credentials
  DB_USER: "snappark_user"
  DB_PASSWORD: "change-me-in-production"

  # JWT
  JWT_SECRET: "change-me-in-production"
  JWT_REFRESH_SECRET: "change-me-in-production"

  # External APIs
  GEMINI_API_KEY: ""

  # Twilio (SMS)
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_PHONE_NUMBER: ""

  # SMTP (Email)
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASS: ""

  # Firebase (Push) — path inside the pod (mounted from a separate secret if needed)
  FIREBASE_SERVICE_ACCOUNT_PATH: ""
---
# Postgres credentials consumed by the StatefulSets
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: snappark
type: Opaque
stringData:
  POSTGRES_USER: "snappark_user"
  POSTGRES_PASSWORD: "change-me-in-production"
---
# RabbitMQ credentials
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: snappark
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: "guest"
  RABBITMQ_DEFAULT_PASS: "guest"
