apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: snappark
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: snappark/api-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: snappark-config
                  key: NODE_ENV
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: snappark-config
                  key: AUTH_SERVICE_URL
            - name: VIOLATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: snappark-config
                  key: VIOLATION_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: snappark-config
                  key: NOTIFICATION_SERVICE_URL
            - name: RATE_LIMIT_WINDOW
              valueFrom:
                configMapKeyRef:
                  name: snappark-config
                  key: RATE_LIMIT_WINDOW
            - name: RATE_LIMIT_MAX_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: snappark-config
                  key: RATE_LIMIT_MAX_REQUESTS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: snappark-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: snappark
  labels:
    app: api-gateway
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
      name: http
  selector:
    app: api-gateway
