apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: snappark
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: snappark/notification-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3004
              name: http
          env:
            - name: PORT
              value: "3004"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: snappark-config
                  key: NODE_ENV
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-notifications:5432/snappark_notifications"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: snappark-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snappark-secrets
                  key: DB_PASSWORD
            - name: MESSAGE_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: snappark-config
                  key: MESSAGE_BROKER_URL
            # Twilio (SMS) — blank disables channel
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: snappark-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: snappark-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: snappark-secrets
                  key: TWILIO_PHONE_NUMBER
            # SMTP (Email) — blank disables channel
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: snappark-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: snappark-config
                  key: SMTP_PORT
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: snappark-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: snappark-secrets
                  key: SMTP_PASS
            - name: SMTP_FROM
              valueFrom:
                configMapKeyRef:
                  name: snappark-config
                  key: SMTP_FROM
            # Firebase (Push) — blank disables channel
            - name: FIREBASE_SERVICE_ACCOUNT_PATH
              valueFrom:
                secretKeyRef:
                  name: snappark-secrets
                  key: FIREBASE_SERVICE_ACCOUNT_PATH
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 45
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: snappark
  labels:
    app: notification-service
spec:
  type: ClusterIP
  ports:
    - port: 3004
      targetPort: 3004
      name: http
  selector:
    app: notification-service
