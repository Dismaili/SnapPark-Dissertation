version: '3.8'

services:
  # ==================== DATABASES ====================

  postgres_auth:
    image: postgres:15-alpine
    container_name: snappark_auth_db
    environment:
      POSTGRES_USER: snappark_user
      POSTGRES_PASSWORD: snappark_password
      POSTGRES_DB: snappark_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snappark_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snappark

  postgres_case:
    # pgvector image = vanilla Postgres 15 with the pgvector extension
    # pre-installed. The violation-analysis service runs `CREATE EXTENSION
    # IF NOT EXISTS vector` on boot to enable vector similarity search.
    # See docs/polyglot-persistence.md for the rationale.
    image: pgvector/pgvector:pg15
    container_name: snappark_case_db
    environment:
      POSTGRES_USER: snappark_user
      POSTGRES_PASSWORD: snappark_password
      POSTGRES_DB: snappark_case
    ports:
      - "5433:5432"
    volumes:
      - postgres_case_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snappark_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snappark

  postgres_notifications:
    image: postgres:15-alpine
    container_name: snappark_notifications_db
    environment:
      POSTGRES_USER: snappark_user
      POSTGRES_PASSWORD: snappark_password
      POSTGRES_DB: snappark_notifications
    ports:
      - "5434:5432"
    volumes:
      - postgres_notifications_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snappark_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snappark

  # ==================== MESSAGE BROKER ====================

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: snappark_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - snappark

  # ==================== ACCESS LAYER ====================

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    container_name: snappark_api_gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      AUTH_SERVICE_URL: http://authentication-service:3001
      VIOLATION_SERVICE_URL: http://violation-analysis-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      RATE_LIMIT_WINDOW: 15m
      RATE_LIMIT_MAX_REQUESTS: 100
    depends_on:
      - authentication-service
      - violation-analysis-service
      - notification-service
    networks:
      - snappark
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== CORE MICROSERVICES ====================

  authentication-service:
    build:
      context: ../services/authentication-service
      dockerfile: Dockerfile
    container_name: snappark_auth_service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      DB_HOST: postgres_auth
      DB_PORT: 5432
      DB_NAME: snappark_auth
      DB_USER: snappark_user
      DB_PASSWORD: snappark_password
      JWT_SECRET: your-secret-key-change-in-production
      JWT_REFRESH_SECRET: your-refresh-secret-change-in-production
      TOKEN_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY: 7d
      PASSWORD_SALT_ROUNDS: 10
      # Comma-separated list of emails to auto-promote to admin on boot.
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@snappark.test}
      # Base URL of the API gateway — used in verification email links
      APP_URL: ${APP_URL:-http://localhost:3000}
      # Frontend URL — used for post-verification redirects
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:3002}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-snapparkillegalparking@gmail.com}
    depends_on:
      postgres_auth:
        condition: service_healthy
    networks:
      - snappark
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  violation-analysis-service:
    build:
      context: ../services/violation-analysis-service
      dockerfile: Dockerfile
    container_name: snappark_violation_service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: development
      DATABASE_URL: postgresql://snappark_user:snappark_password@postgres_case:5432/snappark_case
      MESSAGE_BROKER_URL: amqp://guest:guest@rabbitmq:5672
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your-gemini-api-key-here}
      CLEANUP_INTERVAL_MS: 3600000
      EXPIRY_THRESHOLD_HOURS: 24
      MIN_IMAGE_WIDTH: 200
      MIN_IMAGE_HEIGHT: 200
      MIN_BRIGHTNESS: 30
      MAX_BRIGHTNESS: 245
      BLUR_THRESHOLD: 100
    depends_on:
      postgres_case:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - snappark
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    container_name: snappark_notification_service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      NODE_ENV: development
      DATABASE_URL: postgresql://snappark_user:snappark_password@postgres_notifications:5432/snappark_notifications
      MESSAGE_BROKER_URL: amqp://guest:guest@rabbitmq:5672
      # SMS (Twilio) — leave blank to disable
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      # Email (SMTP) — leave blank to disable
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-snapparkillegalparking@gmail.com}
      # Push (Firebase) — leave blank to disable
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
    depends_on:
      postgres_notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - snappark
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== DATABASE ADMIN ====================

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: snappark_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@snappark.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres_auth
      - postgres_case
      - postgres_notifications
    networks:
      - snappark

volumes:
  postgres_auth_data:
  postgres_case_data:
  postgres_notifications_data:
  rabbitmq_data:

networks:
  snappark:
    driver: bridge
