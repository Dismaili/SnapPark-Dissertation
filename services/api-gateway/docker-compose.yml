version: '3.8'

# SnapPark – API Gateway + Authentication Service stack
# This compose file starts the API Gateway together with the Authentication
# Service and its private PostgreSQL database.  It allows you to test the
# full access-layer flow locally:
#
#   Client → API Gateway (:3000) → Auth Service (:3001) → Auth DB

services:

  # ── User / Auth Database ──────────────────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    container_name: snappark-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       auth_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Authentication Service ─────────────────────────────────────────────────
  authentication-service:
    build:
      context: ../authentication-service
      dockerfile: Dockerfile
    container_name: snappark-auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST:     auth-db
      DB_PORT:     5432
      DB_NAME:     auth_db
      DB_USER:     postgres
      DB_PASSWORD: postgres
      JWT_SECRET:          change-this-in-production
      JWT_REFRESH_SECRET:  change-this-refresh-in-production
      TOKEN_EXPIRY:        15m
      REFRESH_TOKEN_EXPIRY: 7d
      PASSWORD_SALT_ROUNDS: 10
    depends_on:
      auth-db:
        condition: service_healthy

  # ── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snappark-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      AUTH_SERVICE_URL:      http://authentication-service:3001
      VIOLATION_SERVICE_URL: http://violation-analysis-service:3002
      RATE_LIMIT_WINDOW_MS:  900000
      RATE_LIMIT_MAX_REQUESTS: 100
      MAX_IMAGE_SIZE: 10485760
    depends_on:
      - authentication-service

volumes:
  auth-db-data:
    name: snappark-auth-db-data
